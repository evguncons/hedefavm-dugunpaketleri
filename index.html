<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijital Flipbook</title>
    
    <!-- Tailwind CSS (Tasarım ve Düzen için) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome (İkonlar için) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        magenta: {
                            50: '#fdf2f8',
                            100: '#fce7f3',
                            200: '#fbcfe8',
                            500: '#ec4899',
                            600: '#db2777',
                            700: '#be185d', // Koyu Magenta
                            900: '#831843',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Arkaplan Düz Pembe Magenta */
        .bg-solid-magenta {
            background-color: #e6007e;
        }

        /* Kitap ve Sayfa Stilleri */
        .flipbook {
            display: none; /* Yüklenene kadar gizli */
            box-shadow: 0 20px 50px rgba(131, 24, 67, 0.3);
            border-radius: 4px;
        }
        
        .page {
            background-color: #ffffff;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
        }

        /* Cilt (Kitap Ortası) Gölgelendirmesi */
        .page.--left {
            border-right: 1px solid rgba(0,0,0,0.1);
            box-shadow: inset -10px 0 20px rgba(0,0,0,0.05);
        }
        .page.--right {
            border-left: 1px solid rgba(0,0,0,0.1);
            box-shadow: inset 10px 0 20px rgba(0,0,0,0.05);
        }

        .page canvas {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Sayfayı tam sığdır */
        }

        /* Yükleme Animasyonu */
        .loader {
            border: 5px solid #fbcfe8;
            border-bottom-color: #be185d;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* HedefAVM Filigranı */
        .watermark {
            position: absolute;
            bottom: -15px;
            right: 20px;
            font-size: 8rem;
            font-weight: 900;
            font-style: italic;
            color: rgba(255, 255, 255, 0.4);
            z-index: 0;
            pointer-events: none;
            letter-spacing: -5px;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden font-sans text-gray-800 bg-solid-magenta">

    <!-- Üst Header -->
    <header class="bg-black bg-opacity-20 text-white p-3 flex justify-between items-center shadow-none z-10 absolute top-0 left-0 right-0">
        <div class="font-semibold text-lg tracking-wide flex items-center gap-4" id="book-title">
            <span><i class="fas fa-heart text-pink-500"></i> Fırsat Kataloğu</span>
            <div class="bg-black bg-opacity-40 px-4 py-1 rounded-full text-sm whitespace-nowrap">
                Sayfa <span id="current-page">0</span> / <span id="total-pages">0</span>
            </div>
        </div>
        <div class="flex gap-4 items-center">
            <a href="https://instagram.com/hedefavm" target="_blank" class="bg-black bg-opacity-40 hover:bg-opacity-60 transition px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-2 shadow-md">
                <i class="fab fa-instagram text-pink-400 text-lg"></i> İnstagram
            </a>
        </div>
    </header>

    <!-- Ana İçerik Alanı (Arkaplan) -->
    <main class="flex-1 relative flex items-center justify-center overflow-hidden w-full h-full pt-16" id="main-container">
        
        <!-- HedefAVM Yazısı -->
        <div class="watermark">HedefAVM</div>

        <!-- Yükleniyor Ekranı -->
        <div id="loading-screen" class="absolute inset-0 bg-[#e6007e] flex flex-col items-center justify-center z-20 text-white">
            <div class="loader mb-4 border-white border-bottom-color-transparent"></div>
            <p class="font-semibold text-xl" id="loading-text">Katalog Yükleniyor, lütfen bekleyin...</p>
        </div>

        <!-- Kitap Konteyneri -->
        <div id="flipbook" class="flipbook z-10 mt-8">
            <!-- Sayfalar JS tarafından buraya eklenecek -->
        </div>

    </main>

    <!-- Alt Araç Çubuğu -->
    <footer class="absolute bottom-6 left-1/2 transform -translate-x-1/2 bg-black bg-opacity-50 backdrop-blur-sm rounded-full p-2 shadow-2xl z-20 flex sm:flex-row justify-between items-center px-6">
        
        <!-- Sol İkonlar -->
        <div class="flex gap-4 text-white opacity-90 mb-2 sm:mb-0 mr-6">
            <button class="hover:text-pink-300 transition" title="İçindekiler"><i class="fas fa-list"></i></button>
            <button class="hover:text-pink-300 transition" title="Küçük Resimler"><i class="fas fa-th-large"></i></button>
        </div>

        <!-- Sayfa Kontrolleri (Orta) -->
        <div class="flex gap-6 items-center border-l border-r border-gray-400 border-opacity-30 px-6">
            <button id="btn-prev" class="text-white hover:text-pink-300 disabled:opacity-30 disabled:cursor-not-allowed transition text-2xl" disabled>
                <i class="fas fa-chevron-left"></i>
            </button>
            <button id="btn-next" class="text-white hover:text-pink-300 disabled:opacity-30 disabled:cursor-not-allowed transition text-2xl" disabled>
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>

        <!-- Sağ İkonlar -->
        <div class="flex gap-4 text-white opacity-90 mt-2 sm:mt-0 ml-6">
            <button class="hover:text-pink-300 transition" title="Paylaş"><i class="fas fa-share-alt"></i></button>
            <button class="hover:text-pink-300 transition" title="Tam Ekran" id="btn-fullscreen"><i class="fas fa-expand"></i></button>
        </div>
    </footer>

    <!-- Gerekli Kütüphaneler (PDF.js ve PageFlip.js) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>

    <script>
        // PDF.js Worker Tanımlaması
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        /* * DİREKT PDF URL'Sİ:
         * DİKKAT: Buraya sitenize yüklediğiniz direkt ".pdf" ile biten linki girmelisiniz.
         * Aksi halde tarayıcı güvenlik (CORS) kuralları gereği dışarıdan dosya okumayı engeller.
         */
        const DEFAULT_PDF_URL = 'https://raw.githubusercontent.com/mozilla/pdf.js/ba2edeae/web/compressed.tracemonkey-pldi-09.pdf'; // TEST İÇİN DOLDURULDU, KENDİ LİNKİNİZLE DEĞİŞTİRİN!

        // Değişkenler
        let pageFlipObj = null;
        let pdfDoc = null;
        let isZoomed = false;

        // DOM Elementleri
        const loadingScreen = document.getElementById('loading-screen');
        const flipbookEl = document.getElementById('flipbook');
        const bookTitle = document.getElementById('book-title');
        const currentPageEl = document.getElementById('current-page');
        const totalPagesEl = document.getElementById('total-pages');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const btnFullscreen = document.getElementById('btn-fullscreen');

        // Otomatik başlat
        window.addEventListener('DOMContentLoaded', () => {
            if (DEFAULT_PDF_URL) {
                loadPdfFromUrl(DEFAULT_PDF_URL);
            }
        });

        async function loadPdfFromUrl(url) {
            loadingScreen.classList.remove('hidden');
            try {
                const loadingTask = pdfjsLib.getDocument(url);
                const pdf = await loadingTask.promise;
                await processPdf(pdf);
            } catch (error) {
                console.error("PDF Yükleme hatası:", error);
                alert("PDF yüklenemedi! \n\nLütfen kod içindeki 'DEFAULT_PDF_URL' değişkenine direkt '.pdf' ile biten geçerli bir link yazdığınızdan emin olun.");
                document.getElementById('loading-text').textContent = "HATA: PDF Yüklenemedi.";
            }
        }

        async function processPdf(pdf) {
            pdfDoc = pdf;
            const numPages = pdf.numPages;
            totalPagesEl.textContent = numPages;
            flipbookEl.innerHTML = ''; // Temizle

            // 1. Sayfadan baz alınarak kitap boyutlarını belirleyelim
            const firstPage = await pdf.getPage(1);
            const viewport = firstPage.getViewport({ scale: 1.5 }); // Kaliteli render için scale 1.5
            const baseWidth = viewport.width;
            const baseHeight = viewport.height;

            // Tüm sayfaları render et (Büyük PDF'ler için optimizasyon eklenebilir, şimdilik hepsi)
            for (let pageNum = 1; pageNum <= numPages; pageNum++) {
                document.getElementById('loading-text').textContent = `Sayfalar oluşturuluyor (${pageNum}/${numPages})...`;
                
                const page = await pdf.getPage(pageNum);
                const pageViewport = page.getViewport({ scale: 1.5 });
                
                // Sayfa Div'i
                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                
                // Canvas oluştur
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d', { alpha: false });
                canvas.width = pageViewport.width;
                canvas.height = pageViewport.height;

                // PDF sayfasını Canvas'a çiz
                const renderContext = {
                    canvasContext: context,
                    viewport: pageViewport
                };
                
                await page.render(renderContext).promise;
                pageDiv.appendChild(canvas);
                flipbookEl.appendChild(pageDiv);
            }

            // Sayfalar hazır, PageFlip'i başlat
            initPageFlip(baseWidth, baseHeight);
            
            loadingScreen.classList.add('hidden');
            flipbookEl.style.display = 'block';
            currentPageEl.textContent = '1';
            
            // Butonları aktif et
            btnNext.disabled = false;
        }

        function initPageFlip(width, height) {
            // Eğer önceki bir kitap varsa temizle
            if (pageFlipObj) {
                pageFlipObj.destroy();
            }

            pageFlipObj = new St.PageFlip(flipbookEl, {
                width: width, // Sayfa genişliği
                height: height, // Sayfa yüksekliği
                size: "stretch", // Konteynere göre ayarla
                minWidth: 300,
                maxWidth: 1000,
                minHeight: 400,
                maxHeight: 1400,
                maxShadowOpacity: 0.5, // Gölgelendirme
                showCover: true, // İlk ve son sayfa kapak gibi davransın
                mobileScrollSupport: true, // Mobilde kaydırma desteği
                usePortrait: true // Dikey ekranlarda tek sayfa modu
            });

            // HTML içindeki ".page" sınıflı elementleri kitaba yükle
            pageFlipObj.loadFromHTML(document.querySelectorAll('.page'));

            // Sayfa çevrilince çalışacak event
            pageFlipObj.on('flip', (e) => {
                // e.data güncel sayfa indexidir (0'dan başlar). Kapak modu olduğu için +1
                let currentPage = e.data + 1;
                currentPageEl.textContent = currentPage;

                // Buton durumlarını güncelle
                btnPrev.disabled = (currentPage === 1);
                btnNext.disabled = (currentPage >= pdfDoc.numPages);
            });
        }

        // --- Alt Araç Çubuğu Buton İşlevleri ---

        btnPrev.addEventListener('click', () => {
            if (pageFlipObj) pageFlipObj.flipPrev();
        });

        btnNext.addEventListener('click', () => {
            if (pageFlipObj) pageFlipObj.flipNext();
        });

        // Tam Ekran
        btnFullscreen.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Tam ekran hatası: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });

    </script>
</body>
</html>
